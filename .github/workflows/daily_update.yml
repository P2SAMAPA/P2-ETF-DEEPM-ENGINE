name: Daily Dataset Update

on:
  schedule:
    - cron: "0 22 * * 1-5"   # 22:00 UTC Mon-Fri (after US market close)
  workflow_dispatch:          # allow manual trigger anytime

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily update
        env:
          HF_TOKEN:        ${{ secrets.HF_TOKEN }}
          FRED_API_KEY:    ${{ secrets.FRED_API_KEY }}
          HF_DATASET_REPO: "P2SAMAPA/p2-etf-deepm-data"
        run: python update_daily.py

      - name: Notify on failure
        if: failure()
        run: echo "Daily update failed — check logs above"
