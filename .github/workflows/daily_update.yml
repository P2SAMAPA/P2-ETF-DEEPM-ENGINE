name: Daily Dataset Update

on:
  schedule:
    # Run at a random minute between 22:00 and 23:00 UTC to spread load
    - cron: "0 22 * * 1-5"
  workflow_dispatch:   # manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements_train.txt

      - name: Add random startup delay (5-30 seconds)
        run: sleep $((5 + RANDOM % 26))

      - name: Incremental data update
        env:
          FRED_API_KEY:    ${{ secrets.FRED_API_KEY }}
          HF_TOKEN:        ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
        run: python update_daily.py

      - name: Confirm update
        run: echo "Daily update complete."
