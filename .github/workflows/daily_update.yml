name: Daily Dataset Update

on:
  schedule:
    - cron: "0 22 * * 1-5"   # 22:00 UTC Mon-Fri (after US market close)
  workflow_dispatch:          # manual trigger anytime

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements_train.txt

      - name: Incremental data update
        env:
          FRED_API_KEY:    ${{ secrets.FRED_API_KEY }}
          HF_TOKEN:        ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
        run: python update_daily.py

      - name: Confirm update
        run: echo "Daily update complete."
