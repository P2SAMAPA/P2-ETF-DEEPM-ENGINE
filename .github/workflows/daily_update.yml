name: Daily Dataset Update

on:
  schedule:
    # Run at 22:00 UTC Mon-Fri (after US market close)
    - cron: "0 22 * * 1-5"
  workflow_dispatch:   # manual trigger anytime

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements_train.txt

      - name: Add random startup delay (5-30 seconds)
        run: sleep $((5 + RANDOM % 26))

      - name: Incremental data update
        env:
          FRED_API_KEY:    ${{ secrets.FRED_API_KEY }}
          HF_TOKEN:        ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
        run: python update_daily.py
        
      - name: Verify updated data
        run: |
          python -c "
          import pandas as pd
          from huggingface_hub import hf_hub_download
          path = hf_hub_download(
              repo_id='${{ secrets.HF_DATASET_REPO }}',
              filename='data/master.parquet',
              repo_type='dataset',
              token='${{ secrets.HF_TOKEN }}',
              force_download=True
          )
          df = pd.read_parquet(path)
          print('Last 5 dates in master:')
          print(df.index[-5:])
          "

      - name: Confirm update
        run: echo "Daily update complete."
