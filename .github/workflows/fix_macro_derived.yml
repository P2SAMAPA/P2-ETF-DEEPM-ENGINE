name: Fix macro_derived index

on:
  workflow_dispatch:  # manual trigger only

jobs:
  fix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fix and re-upload macro_derived.parquet
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          python - <<EOF
          import data_utils as du
          import config as cfg

          macro = du.load_parquet(cfg.FILE_MACRO_FRED)
          print(f"Raw macro: {macro.shape}, range: {macro.index[0].date()} → {macro.index[-1].date()}")

          macro_derived = du.compute_macro_derived(macro)
          print(f"Derived: {macro_derived.shape}, range: {macro_derived.index[0].date()} → {macro_derived.index[-1].date()}")

          du.upload_parquet(macro_derived, cfg.FILE_MACRO_DERIVED, "Fix: restore DatetimeIndex on macro_derived")
          print("Done.")
          EOF
