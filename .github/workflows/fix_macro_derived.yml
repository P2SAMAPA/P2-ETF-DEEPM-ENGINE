name: Fix macro_derived index

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Diagnose macro_fred.parquet
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          python - <<EOF
          from huggingface_hub import hf_hub_download
          import pandas as pd
          import config as cfg

          # Read raw parquet WITHOUT any processing
          local = hf_hub_download(
              repo_id=cfg.HF_DATASET_REPO,
              filename=cfg.FILE_MACRO_FRED,
              repo_type="dataset",
              token=cfg.HF_TOKEN,
              force_download=True,
          )
          raw = pd.read_parquet(local)

          print("=== RAW macro_fred.parquet ===")
          print(f"Shape: {raw.shape}")
          print(f"Columns: {list(raw.columns)}")
          print(f"Index type: {type(raw.index)}")
          print(f"Index name: {raw.index.name}")
          print(f"Index dtype: {raw.index.dtype}")
          print(f"Index sample: {raw.index[:5].tolist()}")
          print(f"Head:\n{raw.head(3)}")
          print(f"Tail:\n{raw.tail(3)}")

          # Also check etf_returns for comparison
          local2 = hf_hub_download(
              repo_id=cfg.HF_DATASET_REPO,
              filename=cfg.FILE_ETF_RETURNS,
              repo_type="dataset",
              token=cfg.HF_TOKEN,
              force_download=True,
          )
          raw2 = pd.read_parquet(local2)

          print("\n=== RAW etf_returns.parquet ===")
          print(f"Shape: {raw2.shape}")
          print(f"Columns: {list(raw2.columns)}")
          print(f"Index type: {type(raw2.index)}")
          print(f"Index name: {raw2.index.name}")
          print(f"Index dtype: {raw2.index.dtype}")
          print(f"Index sample: {raw2.index[:5].tolist()}")
          print(f"Head:\n{raw2.head(3)}")
          EOF
