name: Seed Dataset (run once)

on:
  workflow_dispatch:
    inputs:
      push_meta:
        description: "Also push metadata.json"
        required: false
        default: "true"

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download full dataset (2008 to today)
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          HF_TOKEN:     ${{ secrets.HF_TOKEN }}
        run: python data_download.py --mode seed

      - name: Push data to HuggingFace
        env:
          HF_TOKEN:        ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
        run: |
          if [ "${{ github.event.inputs.push_meta }}" = "true" ]; then
            python data_upload_hf.py --meta
          else
            python data_upload_hf.py
          fi

      - name: Confirm upload
        run: echo "Seed complete. Data uploaded to HuggingFace."
